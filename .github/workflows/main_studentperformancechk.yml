# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - studentperformancechk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: testdockeratul.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_509166EF4FA644CDBD94970080AA50DF }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_66A8BF93858A42F7906144CE87C8BA94 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: testdockeratul.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_509166EF4FA644CDBD94970080AA50DF }}/studentperformance:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7F6E9BED5E80448CBD1816BEB69812F7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_69FF48CC78E24F56ABD4E5EB2C4ACB5E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EA1274FA4EE241908788A3150A111D3E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'studentperformancechk'
          slot-name: 'Production'
          images: 'testdockeratul.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_509166EF4FA644CDBD94970080AA50DF }}/studentperformance:${{ github.sha }}'
          